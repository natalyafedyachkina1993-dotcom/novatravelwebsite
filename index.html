<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">NovaTravel — Туры по Шёлковому пути</title>
<meta name="description" id="page-desc" content="Авторские туры по Кыргызстану, Казахстану, Узбекистану, Таджикистану и Туркменистану">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --lav:#B8A9CC;--lav-dk:#8B7AAA;--lav-lt:#EDE8F5;--lav-dp:#4A3B6B;
  --grn:#7A9E7E;--grn-lt:#EBF2EB;--pch:#E8AA88;--pch-lt:#FDF0E8;
  --bg:#FAFAF8;--wh:#fff;--tx:#2C2438;--txm:#5A4F6A;--txl:#8A7A9A;--bdr:#E2D8EE;
  --fh:'Playfair Display',Georgia,serif;--fb:'DM Sans',sans-serif;
  --r:16px;--rs:8px;--sh:0 4px 24px rgba(74,59,107,.10);--shl:0 12px 40px rgba(74,59,107,.15);--hh:72px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);line-height:1.6;overflow-x:hidden}
img{max-width:100%;display:block}a{text-decoration:none;color:inherit}ul{list-style:none}
button{cursor:pointer;border:none;background:none;font-family:var(--fb)}
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.sec{padding:72px 0}.sec-alt{background:var(--lav-lt)}.sec-grn{background:var(--grn-lt)}.sec-dk{background:var(--lav-dp)}
.lbl{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--lav-dk);display:block;margin-bottom:10px}
.dk .lbl{color:var(--lav)}
.h2{font-family:var(--fh);font-size:clamp(1.9rem,4vw,2.9rem);font-weight:400;line-height:1.18;margin-bottom:14px}
.h2 em{font-style:italic;color:var(--lav-dk)}.dk .h2{color:#fff}
.sub{font-size:.97rem;color:var(--txm);line-height:1.75;max-width:520px}
.dk .sub{color:rgba(255,255,255,.65)}
.sh{margin-bottom:48px}.sh.c{text-align:center}.sh.c .sub{margin:0 auto}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:40px;font-family:var(--fb);font-size:.875rem;font-weight:500;transition:all .25s;white-space:nowrap;cursor:pointer;border:none}
.bp{background:var(--lav-dk);color:#fff}.bp:hover{background:var(--lav-dp);transform:translateY(-2px);box-shadow:var(--sh)}
.bo{border:1.5px solid var(--lav-dk)!important;color:var(--lav-dk);background:none}.bo:hover{background:var(--lav-dk);color:#fff}
.bw{background:#fff;color:var(--lav-dp)}.bw:hover{background:var(--lav-lt)}
.bsm{padding:9px 20px;font-size:.82rem}.bfull{width:100%;justify-content:center}
.bdg{display:inline-block;padding:4px 11px;border-radius:20px;font-size:.68rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.bx-hit{background:var(--pch);color:#fff}.bx-sale{background:#D95B5B;color:#fff}
.bx-new{background:var(--grn);color:#fff}.bx-on{background:var(--lav-dk);color:#fff}
.bx-off{background:#5B8A6A;color:#fff}.bx-free{background:var(--lav-lt);color:var(--lav-dp)}
.bx-paid{background:var(--lav-dp);color:#fff}
 
/* ══ HEADER */
.hdr{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--hh);background:rgba(250,250,248,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(226,216,238,.6);transition:box-shadow .3s}
.hdr.sc{box-shadow:var(--sh)}
.hi{height:100%;display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo img{height:40px;width:40px;object-fit:contain}
.logo-n{font-family:var(--fh);font-size:1.2rem;color:var(--tx)}
.hnav{display:flex;gap:4px;margin-left:10px}
.hnav>a{font-size:.84rem;color:var(--txm);padding:6px 10px;border-radius:6px;transition:all .2s}
.hnav>a:hover{color:var(--lav-dk);background:var(--lav-lt)}
.dd-w{position:relative}
.dd-w>button{display:flex;align-items:center;gap:5px;font-size:.84rem;color:var(--txm);padding:6px 10px;border-radius:6px;transition:all .2s;font-family:var(--fb)}
.dd-w>button:hover{color:var(--lav-dk);background:var(--lav-lt)}
.dd-w>button svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;transition:transform .2s}
.dd-w:hover>button svg{transform:rotate(180deg)}
.dd-menu{display:none;position:absolute;top:calc(100% + 8px);left:0;background:#fff;border:1px solid var(--bdr);border-radius:12px;padding:8px;box-shadow:var(--shl);min-width:180px;z-index:100}
.dd-w:hover .dd-menu{display:block}
.dd-menu a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:.84rem;color:var(--tx);transition:background .2s}
.dd-menu a:hover{background:var(--lav-lt);color:var(--lav-dk)}
.hsoc{display:flex;gap:7px;align-items:center;margin-left:auto}
.hsoc a{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:var(--lav-dk);color:#fff;transition:all .2s;flex-shrink:0}
.hsoc a:hover{background:var(--lav-dp);transform:translateY(-2px)}
.hsoc svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.hlang{display:flex;gap:2px}
.hlang button{padding:4px 9px;border-radius:16px;font-size:.77rem;font-weight:500;color:var(--txm);transition:all .2s}
.hlang button.on{background:var(--lav-dk);color:#fff}
.brg{display:none;flex-direction:column;gap:5px;padding:6px;cursor:pointer;margin-left:auto}
.brg span{width:22px;height:2px;background:var(--tx);border-radius:2px;transition:all .3s;display:block}
.brg.op span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.brg.op span:nth-child(2){opacity:0}
.brg.op span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mmenu{display:none;position:fixed;top:var(--hh);left:0;right:0;bottom:0;background:var(--bg);z-index:999;padding:24px;overflow-y:auto;flex-direction:column;gap:2px}
.mmenu.op{display:flex}
.mmenu a{font-size:1rem;color:var(--tx);padding:12px 0;border-bottom:1px solid var(--bdr);display:block}
.mm-soc{display:flex;gap:10px;padding-top:16px;flex-wrap:wrap}
.mm-soc a{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:var(--lav-dk);color:#fff}
.mm-soc svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.mm-lang{display:flex;gap:8px;padding-top:12px}
.mm-lang button{padding:7px 14px;border-radius:20px;font-size:.88rem;font-weight:500;border:1.5px solid var(--bdr);color:var(--txm)}
.mm-lang button.on{background:var(--lav-dk);color:#fff;border-color:var(--lav-dk)}
 
/* ══ HERO */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;margin-top:var(--hh);overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#352660 0%,#5A4685 45%,#7C6BA0 70%,#9E90B8 100%)}
.hc{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.07)}
.hc1{width:560px;height:560px;top:-80px;right:-80px}
.hc2{width:360px;height:360px;bottom:-50px;left:-40px;border-color:rgba(232,170,136,.12)}
.hc3{width:160px;height:160px;top:38%;right:24%;border-color:rgba(122,158,126,.12)}
.hdots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:30px 30px}
.hero-in{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:center;width:100%;padding:72px 0}
.htag{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:40px;padding:5px 14px;font-size:.74rem;color:rgba(255,255,255,.8);letter-spacing:.07em;margin-bottom:20px}
.htag span{width:6px;height:6px;border-radius:50%;background:var(--pch);display:inline-block;flex-shrink:0}
.h1{font-family:var(--fh);font-size:clamp(2.2rem,4.2vw,3.7rem);font-weight:400;line-height:1.12;color:#fff;margin-bottom:20px}
.h1 em{font-style:italic;color:var(--lav)}
.hsub{font-size:.96rem;color:rgba(255,255,255,.66);line-height:1.75;margin-bottom:36px;max-width:440px}
.hbtns{display:flex;gap:12px;flex-wrap:wrap}
.hstats{display:flex;gap:24px;margin-top:40px;padding-top:32px;border-top:1px solid rgba(255,255,255,.1)}
.hstat .n{font-family:var(--fh);font-size:1.8rem;color:#fff;line-height:1}
.hstat .l{font-size:.74rem;color:rgba(255,255,255,.46);margin-top:3px}
.hcard{background:rgba(255,255,255,.08);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:28px;color:#fff}
.hct{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.hct img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1)}
.hct-tx .nm{font-weight:500;font-size:.9rem}.hct-tx .rl{font-size:.74rem;color:rgba(255,255,255,.5)}
.hct-title{font-family:var(--fh);font-size:1.22rem;margin-bottom:7px}
.hcc{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.hctag{background:rgba(255,255,255,.1);border-radius:20px;padding:3px 11px;font-size:.72rem;color:rgba(255,255,255,.78)}
.hcm{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px}
.hcmi{background:rgba(255,255,255,.06);border-radius:9px;padding:10px 12px}
.hcmi .mk{font-size:.68rem;color:rgba(255,255,255,.42);margin-bottom:3px}
.hcmi .mv{font-size:.9rem;font-weight:500}
.hcp{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid rgba(255,255,255,.1)}
.hcp .p{font-family:var(--fh);font-size:1.65rem;color:var(--lav)}
.hcp .pl{font-size:.7rem;color:rgba(255,255,255,.4)}
 
/* ══ ABOUT */
.abg{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.abi-ph{width:100%;height:460px;border-radius:20px;background:linear-gradient(135deg,var(--lav-lt),var(--lav));display:flex;align-items:center;justify-content:center;font-size:5rem;position:relative}
.abfl{position:absolute;bottom:-20px;right:-20px;background:var(--lav-dp);color:#fff;padding:20px 24px;border-radius:16px;text-align:center;box-shadow:var(--shl)}
.abfl .fn{font-family:var(--fh);font-size:2rem;line-height:1}.abfl .fl{font-size:.74rem;opacity:.65;margin-top:3px}
.abt p{color:var(--txm);line-height:1.8;margin-bottom:14px;font-size:.96rem}
.s4{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:28px}
.s4i{background:var(--lav-lt);border-radius:12px;padding:16px 18px;text-align:center}
.s4i .sn{font-family:var(--fh);font-size:1.8rem;color:var(--lav-dk);line-height:1}
.s4i .sl{font-size:.76rem;color:var(--txm);margin-top:4px}
 
/* ══ TOURS GRID — 6 карточек, 3 колонки */
.tours6{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.fc{height:450px;perspective:1400px;cursor:pointer}
.fc-in{position:relative;width:100%;height:100%;transition:transform .65s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.fc.fl .fc-in,.fc:hover .fc-in{transform:rotateY(180deg)}
.ff,.fb{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;overflow:hidden}
.ff{background:var(--wh);border:1px solid var(--bdr)}
.fb{background:linear-gradient(155deg,var(--lav-dp) 0%,#6A52A0 100%);color:#fff;transform:rotateY(180deg);padding:26px;display:flex;flex-direction:column;justify-content:space-between}
.ff-img{width:100%;height:218px;object-fit:cover}
.ff-ph{width:100%;height:218px;display:flex;align-items:center;justify-content:center;font-size:3.5rem}
.ff-bd{padding:16px 18px}
.ff-bx{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.ff-ti{font-family:var(--fh);font-size:1.04rem;margin-bottom:6px;line-height:1.3}
.ff-mt{display:flex;gap:10px;font-size:.76rem;color:var(--txl);flex-wrap:wrap;margin-bottom:5px}
.ff-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.ff-tag{background:var(--lav-lt);color:var(--lav-dp);padding:3px 9px;border-radius:12px;font-size:.7rem;font-weight:500}
.ff-pr{font-family:var(--fh);font-size:1.3rem;color:var(--lav-dk);margin-top:8px}
.fb-ti{font-family:var(--fh);font-size:1.15rem;font-weight:400;margin-bottom:9px}
.fb-de{font-size:.86rem;color:rgba(255,255,255,.75);line-height:1.75;flex:1}
.fb-rt{font-size:.76rem;color:var(--lav);margin-top:8px;opacity:.8}
.fb-ac{margin-top:14px}
 
/* ══ ADVANTAGES */
.adv6{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.advi{background:var(--wh);border:1px solid var(--bdr);border-radius:16px;padding:26px 22px;transition:all .3s}
.advi:hover{box-shadow:var(--shl);transform:translateY(-3px);border-color:var(--lav)}
.adv-ic{width:48px;height:48px;border-radius:12px;background:var(--lav-lt);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.adv-ic svg{width:22px;height:22px;stroke:var(--lav-dk);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.adv-t{font-family:var(--fh);font-size:1rem;margin-bottom:8px}
.adv-p{font-size:.86rem;color:var(--txm);line-height:1.7}
 
/* ══ TEAM */
.tm4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.tmc{background:var(--wh);border-radius:20px;overflow:hidden;border:1px solid var(--bdr);transition:all .3s}
.tmc:hover{box-shadow:var(--shl);transform:translateY(-3px)}
.tmc img{width:100%;height:220px;object-fit:cover}
.tmc-ph{width:100%;height:220px;background:linear-gradient(155deg,var(--lav-lt),var(--bdr));display:flex;align-items:center;justify-content:center;font-size:3.5rem}
.tmc-b{padding:18px}
.tmc-nm{font-family:var(--fh);font-size:1rem;margin-bottom:3px}
.tmc-rl{font-size:.76rem;color:var(--lav-dk);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.tmc-bi{font-size:.83rem;color:var(--txm);line-height:1.6}
 
/* ══ EVENTS */
.ev-wr{overflow:hidden}
.ev-tr{display:flex;gap:20px;transition:transform .5s ease}
.ev-tr .fc{flex:0 0 calc(33.333% - 14px);height:430px}
.ef-back{background:linear-gradient(155deg,var(--lav-dp) 0%,#6A52A0 100%);color:#fff;transform:rotateY(180deg);padding:24px;display:flex;flex-direction:column;justify-content:space-between}
.cctrl{display:flex;gap:10px;justify-content:center;margin-top:24px}
.cbtn{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;color:var(--txm);font-size:.9rem;transition:all .2s;cursor:pointer;background:var(--wh)}
.cbtn:hover{border-color:var(--lav-dk);color:var(--lav-dk)}
.cbtn-dk{background:transparent;border-color:rgba(255,255,255,.18);color:rgba(255,255,255,.45)}
.cbtn-dk:hover{border-color:var(--lav);color:var(--lav);background:transparent}
 
/* ══ VIDEOS */
.vid-wr{overflow:hidden}
.vid-tr{display:flex;gap:20px;transition:transform .5s ease}
.vcard{flex:0 0 calc(33.333% - 14px);border-radius:16px;overflow:hidden;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)}
.vth{position:relative;padding-top:56.25%;cursor:pointer}
.vth img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vth iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.vplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;background:rgba(184,169,204,.88);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;pointer-events:none;transition:transform .2s}
.vth:hover .vplay{transform:translate(-50%,-50%) scale(1.1)}
.vinf{padding:14px}
.vinf-t{font-size:.88rem;color:#fff;font-weight:500}
.vinf-a{font-size:.75rem;color:rgba(255,255,255,.42);margin-top:3px}
.rcta{text-align:center;margin-top:44px;padding:28px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px}
.rcta p{color:rgba(255,255,255,.6);margin-bottom:12px;font-size:.92rem}
 
/* ══ COMMUNITY */
.comm-grid{display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:center}
.comm-img{position:relative;border-radius:20px;overflow:hidden;height:400px;background:linear-gradient(135deg,var(--lav-dp),#8B6AB0);display:flex;align-items:center;justify-content:center;font-size:6rem}
.comm-count{position:absolute;top:20px;left:20px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:14px 18px;color:#fff;text-align:center}
.comm-count .cn{font-family:var(--fh);font-size:1.8rem;line-height:1}
.comm-count .cl{font-size:.74rem;opacity:.8;margin-top:2px}
.comm-adv{display:flex;flex-direction:column;gap:12px;margin:16px 0 24px}
.cadv{display:flex;align-items:flex-start;gap:13px;padding:13px 15px;background:var(--lav-lt);border-radius:12px}
.cadv-ic{width:36px;height:36px;border-radius:10px;background:var(--wh);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cadv-ic svg{width:17px;height:17px;stroke:var(--lav-dk);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.cadv-t{font-size:.87rem;font-weight:500;color:var(--tx);margin-bottom:2px}
.cadv-p{font-size:.81rem;color:var(--txm);line-height:1.55}
 
/* ══ BLOG */
.bl3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.blc{background:var(--wh);border-radius:16px;overflow:hidden;border:1px solid var(--bdr);display:flex;flex-direction:column;transition:all .3s;text-decoration:none}
.blc:hover{box-shadow:var(--shl);transform:translateY(-3px)}
.blc-ph{width:100%;height:190px;background:linear-gradient(135deg,var(--grn-lt),var(--lav-lt));display:flex;align-items:center;justify-content:center;font-size:2.8rem}
.blc-b{padding:18px;flex:1;display:flex;flex-direction:column}
.blc-tg{font-size:.72rem;color:var(--lav-dk);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.blc-ti{font-family:var(--fh);font-size:1rem;line-height:1.42;margin-bottom:8px}
.blc-ex{font-size:.84rem;color:var(--txm);line-height:1.62;flex:1}
.blc-dt{font-size:.72rem;color:var(--txl);margin-top:12px}
 
/* ══ NEWSLETTER */
.nlg{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.nlf{display:flex;flex-direction:column;gap:10px}
.nlf input{padding:13px 18px;border:1.5px solid var(--bdr);border-radius:40px;font-family:var(--fb);font-size:.9rem;background:var(--wh);outline:none;transition:border-color .2s;width:100%}
.nlf input:focus{border-color:var(--lav-dk)}
.nl-note{font-size:.74rem;color:var(--txl)}
#nlMsg{font-size:.8rem;color:var(--grn)}
 
/* ══ FAQ */
.faqw{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:2px}
.fi{border:1px solid var(--bdr);border-radius:8px;overflow:hidden;background:var(--wh)}
.fq{width:100%;text-align:left;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:.9rem;color:var(--tx);cursor:pointer;transition:background .2s;background:none;border:none}
.fq:hover{background:var(--lav-lt)}.fq.on{background:var(--lav-lt);color:var(--lav-dk)}
.fi-ic{font-size:1.1rem;transition:transform .3s;color:var(--lav-dk);flex-shrink:0}
.fq.on .fi-ic{transform:rotate(45deg)}
.fa{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;font-size:.87rem;color:var(--txm);line-height:1.76}
.fa.on{max-height:300px;padding:14px 20px 18px}
.fa a{color:var(--lav-dk)}
 
/* ══ FOOTER */
.ftr{background:var(--lav-dp);color:#fff;padding:60px 0 0}
.ft-top{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:40px;margin-bottom:48px}
.ft-logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ft-logo img{height:38px;width:38px;object-fit:contain;filter:brightness(0) invert(1)}
.ft-logo-n{font-family:var(--fh);font-size:1.15rem;color:#fff}
.ft-desc{font-size:.84rem;color:rgba(255,255,255,.72);line-height:1.75;margin-bottom:14px}
.ft-email{font-size:.84rem;color:var(--lav);display:block;margin-bottom:14px;transition:color .2s}
.ft-email:hover{color:#fff}
.ft-soc{display:flex;gap:9px;flex-wrap:wrap}
.ft-soc a{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .2s}
.ft-soc a:hover{background:var(--lav-dk);transform:translateY(-2px)}
.ft-soc svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ft-col h4{font-size:.72rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.88);margin-bottom:13px;border-bottom:1px solid rgba(255,255,255,.12);padding-bottom:8px}
.ft-col ul{display:flex;flex-direction:column;gap:8px}
.ft-col ul a{font-size:.84rem;color:rgba(255,255,255,.72);transition:color .2s}
.ft-col ul a:hover{color:#fff}
.ft-part{padding:28px 0;border-top:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:28px}
.ft-part h4{font-size:.72rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.88);margin-bottom:18px;text-align:center}
.pcirc{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.pc{width:70px;height:70px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;transition:border-color .2s;font-size:.58rem;color:rgba(255,255,255,.5);text-align:center;padding:4px}
.pc:hover{border-color:var(--lav)}
.ft-bot{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:12px;font-size:.76rem;color:rgba(255,255,255,.45);padding:18px 0;border-top:1px solid rgba(255,255,255,.08)}
.ft-bot a{color:rgba(255,255,255,.45);transition:color .2s}
.ft-bot a:hover{color:#fff}
.ft-bot-sep{color:rgba(255,255,255,.22)}
 
/* ANIMATIONS */
.fu{opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease}
.fu.v{opacity:1;transform:none}
.d1{transition-delay:.1s}.d2{transition-delay:.18s}.d3{transition-delay:.26s}.d4{transition-delay:.34s}
 
/* RESPONSIVE */
@media(max-width:1024px){
  .hero-in{grid-template-columns:1fr;gap:32px;padding:52px 0}.hcard{display:none}
  .abg{grid-template-columns:1fr;gap:40px}
  .adv6{grid-template-columns:repeat(2,1fr)}
  .tm4{grid-template-columns:repeat(2,1fr)}
  .tours6{grid-template-columns:repeat(2,1fr)}
  .ev-tr .fc{flex:0 0 calc(50% - 10px)}
  .vid-tr .vcard{flex:0 0 calc(50% - 10px)}
  .bl3{grid-template-columns:repeat(2,1fr)}
  .nlg,.comm-grid{grid-template-columns:1fr;gap:28px}
  .ft-top{grid-template-columns:1fr 1fr;gap:28px}
  .hsoc{display:none}
}
@media(max-width:768px){
  :root{--hh:60px}
  .sec{padding:52px 0}.wrap{padding:0 16px}
  .hnav,.hlang,.hdr-cta{display:none}.brg{display:flex}
  .h1{font-size:2rem}.hstats{gap:16px;flex-wrap:wrap}
  .adv6,.tm4,.tours6,.bl3{grid-template-columns:1fr}
  .ev-tr .fc,.vid-tr .vcard{flex:0 0 100%}
  .hbtns{flex-direction:column}.hbtns .btn{width:100%;justify-content:center}
  .ft-top{grid-template-columns:1fr;gap:22px}
  .ft-bot{flex-direction:column;text-align:center;gap:8px}
  .comm-img{height:240px}
  .fc:hover .fc-in{transform:none}
}

        </div>
        <div class="ef-back fb">
          <div>
            <div class="ff-bx" style="margin-bottom:11px">
              <span class="bdg ${ev.type==='online'?'bx-on':'bx-off'}">${tr['badge_'+ev.type]}</span>
              <span class="bdg ${ev.price_class}">${ev.price_label}</span>
            </div>
            <div class="fb-ti">${ev.title}</div>
            <div style="font-size:.77rem;color:var(--lav);margin-bottom:10px">${ev.date}</div>
            <div class="fb-de">${ev.full}</div>
          </div>

        </div>
      </div>
    </div>`).join('');
  el.innerHTML = `<div class="wrap">
    <div class="sh fu">
      <span class="lbl" style="color:var(--grn)">${tr.sec_ev_lbl}</span>
      <h2 class="h2">${tr.sec_ev_h2}</h2>
      <p class="sub">${tr.sec_ev_sub}</p>
    </div>
    <div class="ev-wr"><div class="ev-tr" id="evTr">${cards}</div></div>
    <div class="cctrl"><button class="cbtn" onclick="sEv(-1)">←</button><button class="cbtn" onclick="sEv(1)">→</button></div>
  </div>`;
  evI=0;
}
function sEv(d){
  const tr=document.getElementById('evTr');if(!tr)return;
  const cs=tr.querySelectorAll('.fc');
  const vis=window.innerWidth<=768?1:window.innerWidth<=1024?2:3;
  evI=Math.max(0,Math.min(evI+d,cs.length-vis));
  tr.style.transform=`translateX(-${evI*(cs[0].offsetWidth+20)}px)`;
}

}

function toggleM(){
  document.getElementById('brg').classList.toggle('op');
  document.getElementById('mmenu').classList.toggle('op');
}
function initAnims(){
  const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('v')}),{threshold:.1});
  document.querySelectorAll('.fu').forEach(el=>obs.observe(el));
}
